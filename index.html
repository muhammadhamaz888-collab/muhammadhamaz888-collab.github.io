            <script src="https://www.highperformanceformat.com/b36d31ccf5ff108812022138b5f34ba4/invoke.js"></script>

    <div id="toast">Copied to Clipboard! ✨</div>

    <script>
        const input = document.getElementById('userInput');
        const resultsContainer = document.getElementById('results');
        const toast = document.getElementById('toast');

        function mapOffset(str, offsetUpper, offsetLower) {
            return Array.from(str).map(char => {
                let code = char.charCodeAt(0);
                if (code >= 65 && code <= 90) return String.fromCodePoint(offsetUpper + (code - 65));
                if (code >= 97 && code <= 122) return String.fromCodePoint(offsetLower + (code - 97));
                return char;
            }).join('');
        }

        const STYLES = [
            { name:'Serif Bold', fn: t => mapOffset(t, 0x1D400, 0x1D41A) },
            { name:'Serif Italic', fn: t => mapOffset(t, 0x1D434, 0x1D44E) },
            { name:'Sans Bold', fn: t => mapOffset(t, 0x1D5E2, 0x1D5FC) },
            { name:'Sans Italic', fn: t => mapOffset(t, 0x1D61A, 0x1D634) },
            { name:'Gothic Bold', fn: t => mapOffset(t, 0x1D56C, 0x1D586) },
            { name:'Double Struck (Outline)', fn: t => mapOffset(t, 0x1D5A0, 0x1D5BA) },
            { name:'Cursive Bold', fn: t => mapOffset(t, 0x1D4D0, 0x1D4EA) },
            { name:'Monospace Tech', fn: t => mapOffset(t, 0x1D670, 0x1D68A) },
            { name:'Circled Light', fn: t => Array.from(t).map(c => { let code = c.toUpperCase().charCodeAt(0); return (code >= 65 && code <= 90) ? String.fromCodePoint(0x24B6 + (code - 65)) : c; }).join('') },
            { name:'Squared Light', fn: t => Array.from(t).map(c => { let code = c.toUpperCase().charCodeAt(0); return (code >= 65 && code <= 90) ? String.fromCodePoint(0x1F130 + (code - 65)) : c; }).join('') },
            { name:'Aesthetic Sparkle', fn: t => `✨ ${t} ✨` },
            { name:'Love Heart Wave', fn: t => `❤️ ${t} ❤️` },
            { name:'Vaporwave Brackets', fn: t => `【 ${t} 】` },
            { name:'Royal Crown Elite', fn: t => `👑 ${t} 👑` },
            { name:'Cyber Lightning', fn: t => `⚡ ${t} ⚡` },
            { name:'Strikethrough', fn: t => Array.from(t).map(c => c + '\u0336').join('') },
            { name:'Underline Clean', fn: t => Array.from(t).map(c => c + '\u0332').join('') }
        ];

        function renderCards() {
            const val = input.value || "Muhammad";
            resultsContainer.innerHTML = "";

            STYLES.forEach(style => {
                const transformed = style.fn(val);
                const card = document.createElement('div');
                card.className = 'font-card';
                card.innerHTML = `
                    <div class="font-text">${transformed}</div>
                    <button class="copy-btn" onclick="copyToClipboard('${transformed.replace(/'/g, "\\'")}')">Copy</button>
                `;
                resultsContainer.appendChild(card);
            });
        }

        function copyToClipboard(str) {
            navigator.clipboard.writeText(str);
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2200);
        }

        input.addEventListener('input', renderCards);
        renderCards();
    </script>
