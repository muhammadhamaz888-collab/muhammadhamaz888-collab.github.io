<style>
  /* ============ DESIGN TOKENS ============ */
  :root{
    --ink:#18151F;
    --ink-panel:#211C2C;
    --paper:#F4EEDF;
    --paper-2:#EAE0C8;
    --rule:#3A3548;
    --rule-soft:#CFC3A2;
    --stamp:#E7572C;
    --stamp-2:#C2431E;
    --gold:#D9A441;
    --ink-soft:#6E6754;
    --ink-faint:#A79CC9;
    --success:#4C9A6A;
    --radius:16px;
    --radius-sm:10px;
    --shadow:0 18px 40px -20px rgba(0,0,0,.55);
    --font-display:'Fraunces', Georgia, serif;
    --font-body:'Space Grotesk', system-ui, -apple-system, sans-serif;
    --font-mono:'JetBrains Mono', 'Courier New', monospace;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:var(--font-body);
    line-height:1.5;
    min-height:100vh;
  }
  img,svg{display:block;max-width:100%;}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;}
  textarea{font:inherit;color:inherit;}
  a{color:inherit;}

  :focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:4px;}

  .visually-hidden{
    position:absolute;width:1px;height:1px;overflow:hidden;
    clip:rect(0 0 0 0);white-space:nowrap;
  }

  /* ============ HEADER ============ */
  .site-header{
    border-bottom:1px solid var(--rule);
    background:
      radial-gradient(circle at 1px 1px, rgba(244,238,223,.06) 1px, transparent 1px) 0 0/16px 16px,
      var(--ink-panel);
  }
  .header-inner{
    max-width:1180px;margin:0 auto;padding:16px 20px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{
    font-family:var(--font-display);font-weight:700;font-size:1.1rem;
    background:var(--stamp);color:var(--paper);
    width:36px;height:36px;border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .brand-name{font-family:var(--font-display);font-weight:600;font-size:1.05rem;letter-spacing:.01em;}
  .header-note{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-faint);letter-spacing:.03em;}

  /* ============ AD SLOTS ============ */
  .ad-slot{max-width:1180px;margin:22px auto;padding:0 20px;}
  .ad-label{
    display:block;font-family:var(--font-mono);font-size:.65rem;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px;text-align:center;
  }
  .ad-box{
    border:1.5px dashed var(--rule-soft);
    border-radius:var(--radius-sm);
    background:rgba(244,238,223,.04);
    display:flex;align-items:center;justify-content:center;
    min-height:90px;padding:14px;
    color:var(--ink-faint);
  }
  .ad-placeholder-text{
    font-family:var(--font-mono);font-size:.78rem;letter-spacing:.03em;
    text-align:center;
  }
  .ad-top .ad-box, .ad-bottom .ad-box{min-height:90px;}
  .ad-sidebar .ad-box{min-height:250px;}

  /* ============ MAIN / HERO ============ */
  .page{max-width:1180px;margin:0 auto;padding:8px 20px 0;}

  .hero{
    text-align:center;max-width:720px;margin:38px auto 30px;
    padding:0 8px;
  }
  .eyebrow{
    font-family:var(--font-mono);font-size:.72rem;letter-spacing:.16em;
    text-transform:uppercase;color:var(--gold);margin-bottom:14px;
  }
  .hero h1{
    font-family:var(--font-display);font-weight:600;
    font-size:clamp(1.9rem, 1.4rem + 2.4vw, 3.1rem);
    line-height:1.12;letter-spacing:-.01em;margin-bottom:14px;
  }
  .hero-sub{
    color:var(--ink-faint);font-size:clamp(.95rem,.9rem + .3vw,1.05rem);
    max-width:520px;margin:0 auto;
  }

  /* ============ COMPOSER ============ */
  .composer-card{
    background:var(--paper);color:var(--ink);
    border-radius:var(--radius);box-shadow:var(--shadow);
    max-width:760px;margin:0 auto 34px;
    padding:20px 20px 16px;
  }
  .composer-label{
    display:block;font-family:var(--font-mono);font-size:.7rem;
    letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);
    margin-bottom:10px;
  }
  #input-text{
    width:100%;min-height:88px;resize:vertical;
    border:1px solid var(--rule-soft);border-radius:var(--radius-sm);
    background:#FFFDF7;color:var(--ink);
    padding:14px 16px;font-size:1.15rem;font-family:var(--font-body);
    line-height:1.4;
  }
  #input-text:focus{border-color:var(--stamp);}
  .composer-meta{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:10px;font-family:var(--font-mono);font-size:.78rem;color:var(--ink-soft);
  }
  .ghost-btn{
    font-family:var(--font-mono);font-size:.75rem;letter-spacing:.04em;
    text-transform:uppercase;color:var(--ink-soft);
    border:1px solid var(--rule-soft);border-radius:999px;
    padding:6px 14px;transition:background .15s ease,color .15s ease,border-color .15s ease;
  }
  .ghost-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  /* ============ LAYOUT (results + sidebar ad) ============ */
  .layout{
    display:grid;grid-template-columns:1fr;gap:28px;
    align-items:start;
  }
  .layout-aside{order:3;}
  .layout-aside .ad-slot{margin:0;padding:0;}

  @media (min-width:1024px){
    .layout{grid-template-columns:1fr 300px;}
    .layout-aside{order:2;position:sticky;top:20px;}
  }

  /* ============ TOOLBAR / FILTERS ============ */
  .toolbar{
    display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;
  }
  .chip{
    font-family:var(--font-mono);font-size:.75rem;letter-spacing:.03em;
    text-transform:uppercase;padding:7px 14px;border-radius:999px;
    border:1px solid var(--rule);color:var(--ink-faint);
    transition:background .15s ease,color .15s ease,border-color .15s ease;
    min-height:32px;
  }
  .chip:hover{border-color:var(--gold);color:var(--paper);}
  .chip.is-active{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:600;}
  .stat-line{
    font-family:var(--font-mono);font-size:.72rem;color:var(--ink-faint);
    margin:-8px 0 16px;
  }

  /* ============ RESULTS GRID ============ */
  .results-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:14px;
    padding-bottom:8px;
  }

  .specimen-card{
    display:flex;flex-direction:column;gap:12px;
    background:var(--paper);color:var(--ink);
    border:1px solid var(--rule-soft);border-radius:var(--radius);
    padding:16px 16px 14px;text-align:left;
    box-shadow:var(--shadow);cursor:pointer;
    transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    opacity:0;animation:rise .4s ease forwards;
    animation-delay:calc(var(--i, 0) * 18ms);
  }
  .specimen-card:hover{transform:translateY(-3px);border-color:var(--stamp);}
  .specimen-card.is-copied{border-color:var(--success);}

  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .specimen-head{
    display:flex;align-items:baseline;gap:9px;
    border-bottom:1px dashed var(--rule-soft);padding-bottom:9px;
  }
  .specimen-no{font-family:var(--font-mono);font-size:.68rem;color:var(--ink-soft);flex-shrink:0;}
  .specimen-name{
    font-family:var(--font-body);font-weight:600;font-size:.76rem;
    letter-spacing:.05em;text-transform:uppercase;color:var(--stamp-2);
  }

  .specimen-preview{
    font-family:system-ui, 'Segoe UI', 'Noto Sans', Arial, sans-serif;
    font-size:1.3rem;line-height:1.35;color:var(--ink);
    word-break:break-word;min-height:2.6em;
    display:flex;align-items:center;
  }

  .specimen-foot{display:flex;justify-content:flex-end;}
  .specimen-action{
    font-family:var(--font-mono);font-size:.68rem;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink);
    border:1px solid var(--ink);border-radius:999px;
    padding:5px 12px;transition:background .15s ease,color .15s ease,border-color .15s ease;
  }
  .specimen-card:hover .specimen-action{background:var(--stamp);color:var(--paper);border-color:var(--stamp);}
  .specimen-card.is-copied .specimen-action{background:var(--success);color:#fff;border-color:var(--success);}

  .empty-state{
    grid-column:1/-1;
    border:1.5px dashed var(--rule-soft);border-radius:var(--radius);
    padding:40px 20px;text-align:center;color:var(--ink-faint);
  }
  .empty-title{font-family:var(--font-display);font-size:1.2rem;color:var(--paper);margin-bottom:8px;}
  .empty-sub{font-size:.9rem;max-width:360px;margin:0 auto;}

  /* ============ FOOTER ============ */
  .site-footer{
    max-width:1180px;margin:40px auto 0;padding:22px 20px 40px;
    border-top:1px solid var(--rule);
    color:var(--ink-faint);font-size:.82rem;text-align:center;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;}
  }
</style>
</head>

  var UP = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');

  // Builds a lookup-based transform function from target character sets.
  // Splits target strings with spread so astral (surrogate-pair) Unicode

  function buildStyle(upperStr, lowerStr, digitStr){
    var upperArr = upperStr ? Array.from(upperStr) : null;
    var lowerArr = lowerStr ? Array.from(lowerStr) : null;
    var digitArr = digitStr ? Array.from(digitStr) : null;
    var map = {};
    if (upperArr) UP.forEach(function(c,i){ map[c] = upperArr[i]; });
    if (lowerArr) LO.forEach(function(c,i){ map[c] = lowerArr[i]; });
    if (digitArr) DG.forEach(function(c,i){ map[c] = digitArr[i]; });
    return function(text){
      return Array.from(text).map(function(ch){
        return Object.prototype.hasOwnProperty.call(map, ch) ? map[ch] : ch;
      }).join('');
    };
  }

  function wrap(before, after){
    return function(text){ return before + text + after; };
  }

  function markCombine(mark){
    return function(text){
      return Array.from(text).map(function(ch){
        return ch === ' ' ? ch : ch + mark;
      }).join('');

  var UPSIDE_MAP = {

  };

    { name:'Heart', category:'decorative', fn: wrap('💕 ', ' 💕') }
  ];

  // ============ DOM / RENDER ============
  var inputEl = document.getElementById('input-text');
  var grid = document.getElementById('results-grid');
  var charCountEl = document.getElementById('char-count');
  var clearBtn = document.getElementById('clear-btn');
  var toolbar = document.getElementById('filter-toolbar');
  var statLine = document.getElementById('stat-line');
  var srAnnouncer = document.getElementById('sr-announcer');

  var currentFilter = 'all';
  var currentResults = [];

  function pad(n){ return n < 10 ? '0' + n : '' + n; }

  function buildEmptyState(){
    var div = document.createElement('div');
    div.className = 'empty-state';
    div.innerHTML = '<p class="empty-title">Nothing set yet</p>' +
      '<p class="empty-sub">Type a word or a name above — your 30 specimens will line up here, ready to copy.</p>';
    return div;
  }

  function buildCard(item, index){
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'specimen-card';
    btn.dataset.index = String(index);
    btn.dataset.category = item.category;
    btn.style.setProperty('--i', index);
    btn.setAttribute('aria-label', item.name + ' style — tap to copy');

    var head = document.createElement('div');
    head.className = 'specimen-head';

    var no = document.createElement('span');
    no.className = 'specimen-no';
    no.textContent = 'No. ' + pad(index + 1);

    var name = document.createElement('span');
    name.className = 'specimen-name';
    name.textContent = item.name;

    head.appendChild(no);
    head.appendChild(name);

    var preview = document.createElement('div');
    preview.className = 'specimen-preview';
    preview.textContent = item.text;

    var foot = document.createElement('div');
    foot.className = 'specimen-foot';
    var action = document.createElement('span');
    action.className = 'specimen-action';
    action.textContent = 'Copy';
    foot.appendChild(action);

    btn.appendChild(head);
    btn.appendChild(preview);
    btn.appendChild(foot);
    return btn;
  }

  function applyFilter(){
    var cards = grid.querySelectorAll('.specimen-card');
    var visible = 0;
    cards.forEach(function(card){
      var show = currentFilter === 'all' || card.dataset.category === currentFilter;
      card.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    if (cards.length){
      statLine.textContent = 'Showing ' + visible + ' of ' + STYLES.length + ' styles';
    } else {
      statLine.textContent = '';
    }
  }

  function render(){
    var text = inputEl.value;
    grid.innerHTML = '';

    if (!text.trim()){
      grid.appendChild(buildEmptyState());
      statLine.textContent = '';
      currentResults = [];
      return;
    }

    currentResults = STYLES.map(function(s){
      return { name: s.name, category: s.category, text: s.fn(text) };
    });

    currentResults.forEach(function(item, i){
      grid.appendChild(buildCard(item, i));
    });

    applyFilter();
  }

  function updateCharCount(){
    charCountEl.textContent = inputEl.value.length + ' / ' + inputEl.maxLength;
  }

  async function copyText(text){
    try{
      await navigator.clipboard.writeText(text);
      return true;
    } catch(e){
      try{
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        return true;
      } catch(e2){
        return false;
      }
    }
  }

  grid.addEventListener('click', async function(e){
    var card = e.target.closest('.specimen-card');
    if (!card) return;
    var idx = Number(card.dataset.index);
    var item = currentResults[idx];
    if (!item) return;

    var ok = await copyText(item.text);
    if (ok){
      card.classList.add('is-copied');
      var actionEl = card.querySelector('.specimen-action');
      actionEl.textContent = 'Copied ✓';
      srAnnouncer.textContent = item.name + ' style copied to clipboard';
      clearTimeout(card._copyTimeout);
      card._copyTimeout = setTimeout(function(){
        card.classList.remove('is-copied');
        actionEl.textContent = 'Copy';
      }, 1400);
    }
  });

  inputEl.addEventListener('input', function(){
    updateCharCount();
    render();
  });

  clearBtn.addEventListener('click', function(){
    inputEl.value = '';
    updateCharCount();
    render();
    inputEl.focus();
  });

  toolbar.addEventListener('click', function(e){
    var chip = e.target.closest('.chip');
    if (!chip) return;
    currentFilter = chip.dataset.filter;
    toolbar.querySelectorAll('.chip').forEach(function(c){
      var active = c === chip;
      c.classList.toggle('is-active', active);
      c.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
    applyFilter();
  });

  document.addEventListener('DOMContentLoaded', function(){
    updateCharCount();
    render();
  });

  // In case DOMContentLoaded already fired (script at end of body)
  updateCharCount();
  render();
})();
</script>
