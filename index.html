    { name:'Upside Down Flip', category:'effects', fn: function(t){ var map={a:'ɐ',b:'q',c:'ɔ',d:'p',e:'ǝ',f:'ɟ',g:'ƃ',h:'ɥ',i:'ᴉ',j:'ɾ',k:'ʞ',l:'l',m:'ɯ',n:'u',o:'o',p:'d',q:'b',r:'ɹ',s:'s',t:'ʇ',u:'n',v:'ʌ',w:'ʍ',x:'x',y:'ʎ',z:'z',A:'∀',B:'𐐒',C:'Ɔ',D:'𐐔',E:'Ǝ',F:'Ⅎ',G:'⅁',H:'H',I:'I',J:'ſ',K:'ʞ',L:'˥',M:'W',N:'N',O:'O',P:'Ԁ',Q:'Ò',R:'ᴚ',S:'S',T:'⊥',U:'∩',V:'Λ',W:'M',X:'X',Y:'⅄',Z:'Z','0':'0','1':'Ɩ','2':'ᄅ','3':'Ɛ','4':'ㄣ','5':'5','6':'9','7':'ㄥ','8':'8','9':'6'}; return Array.from(t).map(function(c){return map[c]||c;}).reverse().join(''); } },
    { name:'Strikethrough', category:'effects', fn: function(t){ return Array.from(t).map(function(c){return c+'\u0336';}).join(''); } },
    { name:'Underlined Clean', category:'effects', fn: function(t){ return Array.from(t).map(function(c){return c+'\u0332';}).join(''); } },
    { name:'Slash Lines', category:'effects', fn: function(t){ return Array.from(t).map(function(c){return c+'\u0338';}).join(''); } },
    { name:'Bubble Outlines', category:'boxed', fn: buildStyle("ⒶⒷⒸⒹⒺⒻⒼⒽⒾⒿⓀⓁⓂⓃⓄⓅⓆⓇⓈⓉⓊⓋⓌⓍⓎⓏ", "ⓐⓑⓒⓓeⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ", null) },
    { name:'Fancy Star Spark', category:'decorative', fn: function(t){ return "✨ " + t + " ✨"; } },
    { name:'Love Heart Wave', category:'decorative', fn: function(t){ return "❤️ " + t + " ❤️"; } },
    { name:'Crown Royalty', category:'decorative', fn: function(t){ return "👑 " + t + " 👑"; } },
    { name:'Bracket Wrap', category:'decorative', fn: function(t){ return "【" + t + "】"; } },
    { name:'Japanese Aesthetic', category:'decorative', fn: function(t){ return "「" + t + "」"; } },
    { name:'Lightning Bolt', category:'decorative', fn: function(t){ return "⚡ " + t + " ⚡"; } },
    { name:'Diamond Borders', category:'decorative', fn: function(t){ return "♦️ " + t + " ♦️"; } },
    { name:'Arrow Direction', category:'decorative', fn: function(t){ return "🏹 " + t + " 🏹"; } },
    { name:'Square Grid Box', category:'boxed', fn: function(t){ return "▧ " + t + " ▧"; } }
  ];

  var inputText = document.getElementById('input-text');
  var charCount = document.getElementById('char-count');
  var resultsGrid = document.getElementById('results-grid');
  var filterToolbar = document.getElementById('filter-toolbar');
  var statLine = document.getElementById('stat-line');

  var currentFilter = 'all';

  function renderCards() {
    var query = inputText.value || "";
    charCount.textContent = query.length + " / 200";
    resultsGrid.innerHTML = "";

    var filtered = STYLES.filter(function(s) { return currentFilter === 'all' || s.category === currentFilter; });
    statLine.textContent = "Showing " + filtered.length + " font variations";

    if (query.trim() === "") {
      resultsGrid.innerHTML = '<div class="empty-state"><h3>No text entered</h3><p>Please type something to see fonts.</p></div>';
      return;
    }

    filtered.forEach(function(style, idx) {
      var transformed = style.fn(query);
      var card = document.createElement('div');
      card.className = 'specimen-card';
      card.innerHTML = '<div class="specimen-head"><span class="specimen-no">' + String(idx+1).padStart(2,'0') + '</span><span class="specimen-name">' + style.name + '</span></div>' +
                       '<div class="specimen-preview">' + transformed + '</div>' +
                       '<div style="display:flex;"><span class="specimen-action">Copy</span></div>';
      
      card.addEventListener('click', function() {
        navigator.clipboard.writeText(transformed).then(function() {
          var act = card.querySelector('.specimen-action');
          act.textContent = 'Copied!';
          card.classList.add('is-copied');
          setTimeout(function() { act.textContent = 'Copy'; card.classList.remove('is-copied'); }, 1200);
        });
      });
      resultsGrid.appendChild(card);
    });
  }

  inputText.addEventListener('input', renderCards);
  document.getElementById('clear-btn').addEventListener('click', function() { inputText.value = ""; renderCards(); });
  
  filterToolbar.addEventListener('click', function(e) {
    var btn = e.target.closest('.chip');
    if (!btn) return;
    filterToolbar.querySelectorAll('.chip').forEach(function(b) { b.classList.remove('is-active'); });
    btn.classList.add('is-active');
    currentFilter = btn.getAttribute('data-filter');
    renderCards();
  });

  renderCards();
})();
</script>
</body>
</html>
