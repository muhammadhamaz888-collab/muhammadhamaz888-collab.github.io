    <script>
        const input = document.getElementById('userInput');
        const resultsContainer = document.getElementById('results');
        const toast = document.getElementById('toast');

        // Unicode mapping helper
        function mapOffset(str, offsetUpper, offsetLower) {
            return Array.from(str).map(char => {
                let code = char.charCodeAt(0);
                if (code >= 65 && code <= 90) return String.fromCodePoint(offsetUpper + (code - 65));
                if (code >= 97 && code <= 122) return String.fromCodePoint(offsetLower + (code - 97));
                return char;
            }).join('');
        }

        function fullWidth(str) {
            return Array.from(str).map(c => {
                const code = c.charCodeAt(0);
                if (code >= 33 && code <= 126) return String.fromCodePoint(0xFF01 + (code - 33));
                return c;
            }).join('');
        }

        function smallCaps(str) {
            return Array.from(str).map(c => {
                const code = c.toUpperCase().charCodeAt(0);
                // small caps mapping (partial)
                if (c >= 'a' && c <= 'z') {
                    return String.fromCodePoint(0x1D00 + (c.charCodeAt(0) - 97)); // not full, keep English small caps simpler
                }
                return c;
            }).join('');
        }

        const STYLES = [
            { name: 'Serif Bold', fn: t => mapOffset(t, 0x1D400, 0x1D41A) },
            { name: 'Serif Italic', fn: t => mapOffset(t, 0x1D434, 0x1D44E) },
            { name: 'Sans Bold', fn: t => mapOffset(t, 0x1D5E2, 0x1D5FC) },
            { name: 'Sans Italic', fn: t => mapOffset(t, 0x1D61A, 0x1D634) },
            { name: 'Gothic Bold', fn: t => mapOffset(t, 0x1D56C, 0x1D586) },
            { name: 'Double Struck', fn: t => mapOffset(t, 0x1D5A0, 0x1D5BA) },
            { name: 'Cursive Bold', fn: t => mapOffset(t, 0x1D4D0, 0x1D4EA) },
            { name: 'Monospace Tech', fn: t => mapOffset(t, 0x1D670, 0x1D68A) },
            { name: 'Fraktur', fn: t => mapOffset(t, 0x1D504, 0x1D51E) },
            { name: 'Sans-Serif Bold Italic', fn: t => mapOffset(t, 0x1D63A, 0x1D654) },
            { name: 'Script Bold', fn: t => mapOffset(t, 0x1D4AA, 0x1D4C4) }, // placeholder, actually script: 1D4AA
            { name: 'Circled (Uppercase)', fn: t => Array.from(t).map(c => {
                let code = c.toUpperCase().charCodeAt(0);
                return (code >= 65 && code <= 90) ? String.fromCodePoint(0x24B6 + (code - 65)) : c;
            }).join('') },
            { name: 'Squared (Uppercase)', fn: t => Array.from(t).map(c => {
                let code = c.toUpperCase().charCodeAt(0);
                return (code >= 65 && code <= 90) ? String.fromCodePoint(0x1F130 + (code - 65)) : c;
            }).join('') },
            { name: 'Fullwidth / Vaporwave', fn: fullWidth },
            { name: 'Small Caps', fn: smallCaps }, // simplified small caps
            { name: 'Upside Down', fn: t => t.split('').map(c => {
                const flip = {
                    'a':'Йҗ','b':'q','c':'Й”','d':'p','e':'Зқ','f':'Йҹ','g':'Жғ','h':'ЙҘ','i':'бҙү','j':'Йҫ','k':'Кһ','l':'l','m':'ЙҜ','n':'u','o':'o','p':'d','q':'b','r':'Й№','s':'s','t':'КҮ','u':'n','v':'КҢ','w':'КҚ','x':'x','y':'КҺ','z':'z',
                    'A':'вҲҖ','B':'рҗҗ’','C':'ЖҶ','D':'в—–','E':'ЖҺ','F':'в„І','G':'в…Ғ','H':'H','I':'I','J':'Еҝ','K':'вӢҠ','L':'в…ғ','M':'W','N':'N','O':'O','P':'d','Q':'ОҢ','R':'бҙҡ','S':'S','T':'вҠҘ','U':'вҲ©','V':'Оӣ','W':'M','X':'X','Y':'в…„','Z':'Z'
                };
                return flip[c] || c;
            }).join('').split('').reverse().join('') },
            { name: 'Bubble Text', fn: t => Array.from(t).map(c => {
                let code = c.charCodeAt(0);
                if (c >= 'A' && c <= 'Z') return String.fromCodePoint(0x1F150 + (code - 65));
                if (c >= 'a' && c <= 'z') return String.fromCodePoint(0x1F150 + (code - 97));
                if (c >= '0' && c <= '9') return String.fromCodePoint(0x1F7F0 + (code - 48));
                return c;
            }).join('') },
            { name: 'Square Text', fn: t => Array.from(t).map(c => {
                if (c >= 'A' && c <= 'Z') return String.fromCodePoint(0x1F130 + (c.charCodeAt(0) - 65));
                if (c >= 'a' && c <= 'z') return String.fromCodePoint(0x1F130 + (c.charCodeAt(0) - 97));
                return c;
            }).join('') },
            { name: 'Tiny Text (Superscript)', fn: t => Array.from(t).map(c => {
                const sup = {'0':'вҒ°','1':'В№','2':'ВІ','3':'Ві','4':'вҒҙ','5':'вҒө','6':'вҒ¶','7':'вҒ·','8':'вҒё','9':'вҒ№',
                    'a':'бөғ','b':'бөҮ','c':'б¶ң','d':'бөҲ','e':'бөү','f':'б¶ ','g':'бөҚ','h':'К°','i':'вҒұ','j':'КІ','k':'бөҸ','l':'ЛЎ','m':'бөҗ','n':'вҒҝ','o':'бө’','p':'бө–','q':'б‘«','r':'Кі','s':'Лў','t':'бө—','u':'бөҳ','v':'бөӣ','w':'К·','x':'ЛЈ','y':'Кё','z':'б¶»',
                    'A':'бҙ¬','B':'бҙ®','C':'б¶ң','D':'бҙ°','E':'бҙұ','F':'б¶ ','G':'бҙі','H':'бҙҙ','I':'бҙө','J':'бҙ¶','K':'бҙ·','L':'бҙё','M':'бҙ№','N':'бҙә','O':'бҙј','P':'бҙҫ','Q':'б‘«','R':'бҙҝ','S':'Лў','T':'бөҖ','U':'бөҒ','V':'вұҪ','W':'бөӮ','X':'ЛЈ','Y':'Кё','Z':'б¶»'};
                return sup[c] || c;
            }).join('') },
            { name: 'Strikethrough', fn: t => Array.from(t).map(c => c + '\u0336').join('') },
            { name: 'Underline', fn: t => Array.from(t).map(c => c + '\u0332').join('') },
            { name: 'Double Underline', fn: t => Array.from(t).map(c => c + '\u0333').join('') },
            { name: 'Aesthetic Sparkle', fn: t => `вңЁ ${t} вңЁ` },
            { name: 'Love Hearts', fn: t => `вқӨпёҸ ${t} вқӨпёҸ` },
            { name: 'Royal Crown', fn: t => `рҹ‘‘ ${t} рҹ‘‘` },
            { name: 'Cyber Lightning', fn: t => `вҡЎ ${t} вҡЎ` },
            { name: 'Stars Frame', fn: t => `рҹҢҹ ${t} рҹҢҹ` },
            { name: 'Brackets Vaporwave', fn: t => `гҖҗ ${t} гҖ‘` },
            { name: 'Arrow Emphasis', fn: t => `вһӨ ${t} вһӨ` }
        ];

        function renderCards() {
            const val = input.value.trim() || "Muhammad";
            resultsContainer.innerHTML = "";
            STYLES.forEach(style => {
                const transformed = style.fn(val);
                const card = document.createElement('div');
                card.className = "bg-card border border-border rounded-xl p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 hover:border-accent hover:-translate-y-1 transition duration-200";
                card.innerHTML = `
                    <div class="font-text text-lg break-all pr-2">${transformed}</div>
                    <button class="copy-btn bg-accent hover:bg-accent-hover text-white font-medium py-2 px-4 rounded-lg transition whitespace-nowrap" onclick="copyText('${transformed.replace(/'/g, "\\'")}')">Copy</button>
                `;
                resultsContainer.appendChild(card);
            });
        }

        window.copyText = function(text) {
            navigator.clipboard.writeText(text);
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2200);
        };

        input.addEventListener('input', renderCards);
        renderCards();
    </script>
