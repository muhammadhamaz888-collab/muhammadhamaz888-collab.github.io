                const cur = {'a':'ЁЭТ╢','b':'ЁЭТ╖','c':'ЁЭТ╕','d':'ЁЭТ╣','e':'ЁЭСТ','f':'ЁЭТ╗','g':'ЁЭСФ','h':'ЁЭТ╜','i':'ЁЭТ╛','j':'ЁЭТ┐','k':'ЁЭУА','l':'ЁЭУБ','m':'ЁЭУВ','n':'ЁЭУГ','o':'ЁЭСЬ','p':'ЁЭУЕ','q':'ЁЭУЖ','r':'ЁЭУЗ','s':'ЁЭУИ','t':'ЁЭУЙ','u':'ЁЭУК','v':'ЁЭУЛ','w':'ЁЭУМ','x':'ЁЭУН','y':'ЁЭУО','z':'ЁЭУП',
                'A':'ЁЭТЬ','B':'ЁЭР╡','C':'ЁЭТЮ','D':'ЁЭТЯ','E':'ЁЭР╕','F':'ЁЭР╣','G':'ЁЭТв','H':'ЁЭР╗','I':'ЁЭР╝','J':'ЁЭТе','K':'ЁЭТж','L':'ЁЭР┐','M':'ЁЭСА','N':'ЁЭТй','O':'ЁЭТк','P':'ЁЭТл','Q':'ЁЭТм','R':'ЁЭСЕ','S':'ЁЭТо','T':'ЁЭТп','U':'ЁЭТ░','V':'ЁЭТ▒','W':'ЁЭТ▓','X':'ЁЭТ│','Y':'ЁЭТ┤','Z':'ЁЭТ╡'};
                return cur[c] || c;
            }).join('') },
            // Symbols
            { name: 'Cursed Text', category: 'symbols', fn: t => Array.from(t).map(c => c + '\u0361' + c).join('') },
            { name: 'Mirror (RTL)', category: 'symbols', fn: t => '\u202E' + t + '\u202C' },
            { name: 'Wingdings Style', category: 'symbols', fn: t => Array.from(t).map(c => {
                const w = {'a':'тЩЛя╕О','b':'тЩМя╕О','c':'тЩНя╕О','d':'тЩОя╕О','e':'тЩПя╕О','f':'тЩРя╕О','g':'тЩСя╕О','h':'тЩТя╕О','i':'тЩУя╕О','j':'тЩИя╕О','k':'тЩЙя╕О','l':'тЩКя╕О','m':'тЩая╕О','n':'тЩгя╕О','o':'тЩея╕О','p':'тЩжя╕О','q':'тЩд','r':'тЩз','s':'тЩб','t':'тЩв','u':'тША','v':'тШБ','w':'тШВ','x':'тШГ','y':'тШД','z':'тШЕ',
                'A':'тЩЛя╕О','B':'тЩМя╕О','C':'тЩНя╕О','D':'тЩОя╕О','E':'тЩПя╕О','F':'тЩРя╕О','G':'тЩСя╕О','H':'тЩТя╕О','I':'тЩУя╕О','J':'тЩИя╕О','K':'тЩЙя╕О','L':'тЩКя╕О','M':'тЩая╕О','N':'тЩгя╕О','O':'тЩея╕О','P':'тЩжя╕О','Q':'тЩд','R':'тЩз','S':'тЩб','T':'тЩв','U':'тША','V':'тШБ','W':'тШВ','X':'тШГ','Y':'тШД','Z':'тШЕ'};
                return w[c] || c;
            }).join('') },
            { name: 'Strikethrough Heavy', category: 'symbols', fn: t => Array.from(t).map(c => c + '\u0336\u0336').join('') },
            { name: 'Underline Wave', category: 'symbols', fn: t => Array.from(t).map(c => c + '\u035C').join('') },
            { name: 'Dot Matrix', category: 'symbols', fn: t => Array.from(t).map(c => c + '\u0323').join('') },
            { name: 'Circle Frame', category: 'symbols', fn: t => `тнХ ${t} тнХ` },
            { name: 'Hex Borders', category: 'symbols', fn: t => `тмб ${t} тмб` },
            { name: 'Arrow Targets', category: 'symbols', fn: t => `тЮ│ ${t} тЮ│` },
            { name: 'Sword Aesthetic', category: 'symbols', fn: t => `тЪФя╕П ${t} тЪФя╕П` },
            { name: 'Pixel Border', category: 'symbols', fn: t => `тЦг ${t} тЦг` },
            { name: 'Chess Symbols', category: 'symbols', fn: t => `тЩФ ${t} тЩФ` },
            { name: 'Music Notes', category: 'symbols', fn: t => `тЩк ${t} тЩк` },
            { name: 'Greek Style', category: 'symbols', fn: t => Array.from(t).map(c => {
                const g = {'a':'╬▒','b':'╬▓','c':'╧В','d':'╬┤','e':'╬╡','f':'╧Ж','g':'╬│','h':'╬╖','i':'╬╣','j':'╧│','k':'╬║','l':'╬╗','m':'╬╝','n':'╬╜','o':'╬┐','p':'╧А','q':'╬╕','r':'╧Б','s':'╧Г','t':'╧Д','u':'╧Е','v':'╧Й','w':'╧Й','x':'╧З','y':'╧И','z':'╬╢',
                'A':'╬С','B':'╬Т','C':'╬г','D':'╬Ф','E':'╬Х','F':'╬ж','G':'╬У','H':'╬Ч','I':'╬Щ','J':'╧│','K':'╬Ъ','L':'╬Ы','M':'╬Ь','N':'╬Э','O':'╬Я','P':'╬а','Q':'╬Ш','R':'╬б','S':'╬г','T':'╬д','U':'╬е','V':'╬й','W':'╬й','X':'╬з','Y':'╬и','Z':'╬Ц'};
                return g[c] || c;
            }).join('') },
            { name: 'Reverse Upside Down', category: 'symbols', fn: t => t.split('').reverse().join('').split('').map(c => {
                const flip = {
                    'a':'╔Р','b':'q','c':'╔Ф','d':'p','e':'╟Э','f':'╔Я','g':'╞Г','h':'╔е','i':'с┤Й','j':'╔╛','k':'╩Ю','l':'l','m':'╔п','n':'u',
                    'o':'o','p':'d','q':'b','r':'╔╣','s':'s','t':'╩З','u':'n','v':'╩М','w':'╩Н','x':'x','y':'╩О','z':'z',
                    'A':'тИА','B':'сЩа','C':'╞Ж','D':'сЧб','E':'╞О','F':'тД▓','G':'тЕБ','H':'H','I':'I','J':'┼┐','K':'тЛК','L':'тЕГ','M':'W','N':'N',
                    'O':'O','P':'╘А','Q':'╬М','R':'с┤Ъ','S':'S','T':'тКе','U':'тИй','V':'╬Ы','W':'M','X':'X','Y':'тЕД','Z':'Z'
                };
                return flip[c] || c;
            }).join('') },
        ];

        function showToast(msg) {
            toast.textContent = msg;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show",""); }, 2500);
        }

        window.previewFont = function(text, styleName) {
            previewText.innerHTML = `<span class="text-xs text-zinc-400 block mb-1">Preview: ${styleName}</span><span class="break-all">${text}</span>`;
        };

        function renderCards() {
            const val = input.value.trim();
            if (!val) {
                resultsContainer.innerHTML = `<p class="text-zinc-500 text-center py-12 text-lg col-span-full">тЬи Type something above to generate premium fonts тЬи</p>`;
                copyAllBtn.disabled = true;
                copyAllBtn.textContent = `ЁЯУЛ Copy All (0)`;
                return;
            }

            let filtered = PREMIUM_STYLES;
            if (currentCategory === 'favorites') {
                filtered = PREMIUM_STYLES.filter(s => favorites.includes(s.name));
                if (filtered.length === 0) {
                    resultsContainer.innerHTML = `<p class="text-zinc-500 text-center py-12 text-lg col-span-full">тЭдя╕П No favorites yet. Click the heart on any premium font to save it.</p>`;
                    copyAllBtn.disabled = true;
                    copyAllBtn.textContent = `ЁЯУЛ Copy All (0)`;
                    return;
                }
            } else if (currentCategory !== 'all') {
                filtered = PREMIUM_STYLES.filter(s => s.category === currentCategory);
            }

            copyAllBtn.disabled = false;
            copyAllBtn.textContent = `ЁЯУЛ Copy All (${filtered.length})`;

            resultsContainer.innerHTML = "";
            filtered.forEach(style => {
                const transformed = style.fn(val);
                const isFav = favorites.includes(style.name);
                const card = document.createElement('div');
                card.className = "bg-card border border-border rounded-xl p-2 sm:p-3 flex flex-col gap-1 hover:border-gold cursor-pointer transition duration-200";
                card.style.backgroundColor = 'var(--card-bg)';
                card.style.borderColor = 'var(--border-color)';
                card.onclick = () => previewFont(transformed, style.name);
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] sm:text-xs text-zinc-400">${style.name}</span>
                        <button class="fav-btn text-sm ${isFav ? 'text-red-500' : 'text-zinc-600'}" onclick="event.stopPropagation(); toggleFavorite('${style.name.replace(/'/g,"\\'")}')">${isFav ? 'тЭдя╕П' : 'ЁЯдН'}</button>
                    </div>
                    <div class="font-text text-xs sm:text-sm break-all leading-tight pr-1">${transformed}</div>
                    <button class="copy-btn mt-1 bg-gold hover:bg-amber-500 text-black font-semibold py-1 px-2 sm:px-3 rounded-full text-[10px] sm:text-xs w-fit transition" onclick="event.stopPropagation(); copyText('${transformed.replace(/'/g,"\\'")}', '${style.name.replace(/'/g,"\\'")}')">Copy</button>
                `;
                resultsContainer.appendChild(card);
            });
        }

        window.copyText = function(text, styleName) {
            navigator.clipboard.writeText(text);
            showToast(`Copied ${styleName}!`);
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(15);
            }
        };

        window.copyAll = function() {
            const val = input.value.trim();
            if (!val) return;
            let filtered = PREMIUM_STYLES;
            if (currentCategory === 'favorites') filtered = PREMIUM_STYLES.filter(s => favorites.includes(s.name));
            else if (currentCategory !== 'all') filtered = PREMIUM_STYLES.filter(s => s.category === currentCategory);
            const allTexts = filtered.map(s => `${s.name}: ${s.fn(val)}`).join('\n');
            navigator.clipboard.writeText(allTexts);
            showToast(`All ${filtered.length} premium fonts copied!`);
        };

        window.clearInput = function() {
            input.value = '';
            input.focus();
            renderCards();
        };

        window.toggleFavorite = function(name) {
            if (favorites.includes(name)) {
                favorites = favorites.filter(f => f !== name);
            } else {
                favorites.push(name);
            }
            localStorage.setItem('favPremiumFonts', JSON.stringify(favorites));
            renderCards();
        };

        window.filterCategory = function(cat) {
            currentCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => {
                if (btn.dataset.category === cat) {
                    btn.classList.add('bg-gold','text-black');
                    btn.classList.remove('bg-card','border','border-border','text-zinc-300');
                } else {
                    btn.classList.remove('bg-gold','text-black');
                    btn.classList.add('bg-card','border','border-border','text-zinc-300');
                }
            });
            renderCards();
        };

        window.randomFont = function() {
            if (!input.value.trim()) {
                alert('Type something first!');
                return;
            }
            const all = PREMIUM_STYLES;
            const randomStyle = all[Math.floor(Math.random() * all.length)];
            const transformed = randomStyle.fn(input.value.trim());
            resultsContainer.innerHTML = "";
            const card = document.createElement('div');
            card.className = "bg-card border border-gold rounded-2xl p-4 sm:p-5 flex flex-col sm:flex-row justify-between items-center gap-4 text-center col-span-2 md:col-span-3";
            card.style.backgroundColor = 'var(--card-bg)';
            card.innerHTML = `
                <div class="flex-1">
                    <p class="text-xs text-zinc-400 mb-2">ЁЯО▓ Random Pick: ${randomStyle.name}</p>
                    <p class="text-xl font-bold break-all">${transformed}</p>
                </div>
                <button class="copy-btn bg-gold hover:bg-amber-500 text-black font-semibold py-2 px-5 rounded-full" onclick="event.stopPropagation(); copyText('${transformed.replace(/'/g,"\\'")}', '${randomStyle.name}')">Copy</button>
            `;
            resultsContainer.appendChild(card);
            card.scrollIntoView({behavior:'smooth'});
            previewFont(transformed, randomStyle.name);
        };

        input.addEventListener('input', () => {
            clearBtn.style.display = input.value ? 'block' : 'none';
            renderCards();
        });

        window.addEventListener('scroll', () => {
            backToTopBtn.style.display = window.scrollY > 400 ? 'flex' : 'none';
        });

        renderCards();
    </script>
</body>
</html>
