    <script>
        const input = document.getElementById('userInput');
        const resultsContainer = document.getElementById('results');

        function zalgo(text, intensity = 5) {
            const zalgoUp = [0x030D,0x030E,0x0304,0x0305,0x033F,0x0311,0x0306,0x0310,0x0352,0x0357,0x0351,0x0307,0x0308,0x030A,0x0342,0x0343,0x0344,0x034A,0x034B,0x034C,0x0303,0x0302,0x030C,0x0350,0x0300,0x0301,0x030B,0x030F,0x0312,0x0313,0x0314,0x033D,0x0309,0x0363,0x0364,0x0365,0x0366,0x0367,0x0368,0x0369,0x036A,0x036B,0x036C,0x036D,0x036E,0x036F,0x033E,0x035B,0x0346,0x031A];
            const zalgoMid = [0x0315,0x031B,0x0340,0x0341,0x0358,0x0321,0x0322,0x0327,0x0328,0x0334,0x0335,0x0336,0x034F,0x035C,0x035D,0x035E,0x035F,0x0360,0x0362,0x0338,0x0337,0x0361,0x0489];
            const zalgoDown = [0x0316,0x0317,0x0318,0x0319,0x031C,0x031D,0x031E,0x031F,0x0320,0x0324,0x0325,0x0326,0x0329,0x032A,0x032B,0x032C,0x032D,0x032E,0x032F,0x0330,0x0331,0x0332,0x0333,0x0339,0x033A,0x033B,0x033C,0x0345,0x0347,0x0348,0x0349,0x034D,0x034E,0x0353,0x0354,0x0355,0x0356,0x0359,0x035A,0x0323];
            function rand(max) { return Math.floor(Math.random() * max); }
            return Array.from(text).map(c => {
                let result = c;
                for (let i = 0; i < intensity; i++) {
                    result += String.fromCodePoint(zalgoUp[rand(zalgoUp.length)]);
                    result += String.fromCodePoint(zalgoMid[rand(zalgoMid.length)]);
                    result += String.fromCodePoint(zalgoDown[rand(zalgoDown.length)]);
                }
                return result;
            }).join('');
        }

        function glitch(text) {
            // simple glitch: combine with random combining marks and strike
            return Array.from(text).map(c => {
                const glitchMarks = ['\u0336', '\u0337', '\u0338', '\u035C', '\u035D', '\u035E'];
                const rand = Math.floor(Math.random() * glitchMarks.length);
                return c + glitchMarks[rand];
            }).join('');
        }

            { name: 'Medieval Script', fn: t => Array.from(t).map(c => {
                const m = {'a':'𝔞','b':'𝔟','c':'𝔠','d':'𝔡','e':'𝔢','f':'𝔣','g':'𝔤','h':'𝔥','i':'𝔦','j':'𝔧','k':'𝔨','l':'𝔩','m':'𝔪','n':'𝔫','o':'𝔬','p':'𝔭','q':'𝔮','r':'𝔯','s':'𝔰','t':'𝔱','u':'𝔲','v':'𝔳','w':'𝔴','x':'𝔵','y':'𝔶','z':'𝔷',

                    'A':'𝒜','B':'𝐵','C':'𝒞','D':'𝒟','E':'𝐸','F':'𝐹','G':'𝒢','H':'𝐻','I':'𝐼','J':'𝒥','K':'𝒦','L':'𝐿','M':'𝑀','N':'𝒩','O':'𝒪','P':'𝒫','Q':'𝒬','R':'𝑅','S':'𝒮','T':'𝒯','U':'𝒰','V':'𝒱','W':'𝒲','X':'𝒳','Y':'𝒴','Z':'𝒵'};
                return cur[c] || c;

            { name: 'Double Struck Sans', fn: t => Array.from(t).map(c => {

                    'a':'𝕒','b':'𝕓','c':'𝕔','d':'𝕕','e':'𝕖','f':'𝕗','g':'𝕘','h':'𝕙','i':'𝕚','j':'𝕛','k':'𝕜','l':'𝕝','m':'𝕞','n':'𝕟','o':'𝕠','p':'𝕡','q':'𝕢','r':'𝕣','s':'𝕤','t':'𝕥','u':'𝕦','v':'𝕧','w':'𝕨','x':'𝕩','y':'𝕪','z':'𝕫',

                return oe[c] || c;
            }).join('') },
            { name: 'Underline Wave', fn: t => Array.from(t).map(c => c + '\u035C').join('') },
            { name: 'Hanging Stars', fn: t => `⋆｡°✩ ${t} ✩°｡⋆` },
            { name: 'Crystal Clear', fn: t => `✧ ${t} ✧` },
            { name: 'Angelic', fn: t => `☁️ ${t} ☁️` },
            { name: 'Demon Core', fn: t => `🔥 ${t} 🔥` }
        ];

        function renderCards() {
            const val = input.value.trim() || "Muhammad";
            resultsContainer.innerHTML = "";
            PREMIUM_STYLES.forEach(style => {
                const transformed = style.fn(val);
                const card = document.createElement('div');
                card.className = "bg-card border border-border rounded-xl p-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 hover:border-gold hover:-translate-y-1 transition duration-200";
                card.innerHTML = `
                    <div class="font-text text-lg break-all pr-2">${transformed}</div>
                    <button class="copy-btn bg-amber-500 hover:bg-amber-600 text-white font-medium py-2 px-4 rounded-lg transition whitespace-nowrap" onclick="copyText('${transformed.replace(/'/g, "\\'")}')">Copy</button>
                `;
                resultsContainer.appendChild(card);
            });
        }

        window.copyText = function(text) {
            navigator.clipboard.writeText(text);
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2200);
        };

        input.addEventListener('input', renderCards);
        renderCards();
    </script>
